<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Учёт доходов и расходов в гривнах">
  <meta name="theme-color" content="#07070f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Деньги · ₴</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="app" id="mainView">
    <header class="header">
      <div class="header-top">
        <h1 class="logo">Деньги<span class="logo-currency">₴</span></h1>
        <div class="header-actions">
          <button class="icon-btn" id="btnSettings" type="button" title="Категории" aria-label="Категории">⚙</button>
          <button class="icon-btn" id="btnExport" type="button" title="Экспорт данных" aria-label="Экспорт">↓</button>
        </div>
      </div>
      <div class="month-nav">
        <button class="icon-btn" id="btnPrevMonth" type="button" aria-label="Предыдущий месяц">‹</button>
        <span class="month-label" id="monthLabel">Июнь 2026</span>
        <button class="icon-btn" id="btnNextMonth" type="button" aria-label="Следующий месяц">›</button>
      </div>
    </header>

    <section class="summary" aria-label="Итог за месяц">
      <div class="summary-card summary-card--income">
        <span class="summary-label">Доход</span>
        <span class="summary-value" id="totalIncome">+0 ₴</span>
      </div>
      <div class="summary-card summary-card--expense">
        <span class="summary-label">Расходы</span>
        <span class="summary-value" id="totalExpense">−0 ₴</span>
      </div>
      <div class="summary-card summary-card--balance">
        <span class="summary-label">Остаток</span>
        <span class="summary-value" id="totalBalance">0 ₴</span>
      </div>
    </section>

    <section class="actions">
      <button class="action-btn action-btn--expense" id="btnAddExpense" type="button">
        <span class="action-icon">−</span>
        <span>Расход</span>
      </button>
      <button class="action-btn action-btn--income" id="btnAddIncome" type="button">
        <span class="action-icon">+</span>
        <span>Доход</span>
      </button>
    </section>

    <section class="section">
      <h2 class="section-title">Куда уходят деньги</h2>
      <div class="categories-chart" id="categoriesChart">
        <p class="empty-state">Пока нет расходов за этот месяц</p>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">Операции</h2>
      <ul class="transactions" id="transactionsList">
        <li class="empty-state">Добавь первую операцию</li>
      </ul>
    </section>
  </div>

  <div class="add-page" id="addView" hidden>
    <header class="add-header">
      <button class="icon-btn" id="btnCloseAdd" type="button" aria-label="Назад">←</button>
      <h2 class="add-title" id="addTitle">Новый расход</h2>
      <span class="add-header-spacer"></span>
    </header>

    <div class="field">
      <span class="field-label">Сумма (₴)</span>
      <div class="amount-field" id="amountField">
        <input class="amount-input" id="amountInput" type="text" inputmode="decimal" enterkeyhint="done" autocomplete="off" placeholder="0" readonly>
      </div>

      <div class="quick-amounts">
        <button type="button" class="quick-btn" data-add="100">+100</button>
        <button type="button" class="quick-btn" data-add="500">+500</button>
        <button type="button" class="quick-btn" data-add="1000">+1000</button>
      </div>

      <div class="numpad" id="numpad">
        <button type="button" class="num-key" data-key="1">1</button>
        <button type="button" class="num-key" data-key="2">2</button>
        <button type="button" class="num-key" data-key="3">3</button>
        <button type="button" class="num-key" data-key="4">4</button>
        <button type="button" class="num-key" data-key="5">5</button>
        <button type="button" class="num-key" data-key="6">6</button>
        <button type="button" class="num-key" data-key="7">7</button>
        <button type="button" class="num-key" data-key="8">8</button>
        <button type="button" class="num-key" data-key="9">9</button>
        <button type="button" class="num-key" data-key=".">,</button>
        <button type="button" class="num-key" data-key="0">0</button>
        <button type="button" class="num-key num-key--back" data-key="back">⌫</button>
      </div>
    </div>

    <div class="field">
      <span class="field-label">Категория</span>
      <div class="category-grid" id="categoryGrid"></div>
    </div>

    <div class="field">
      <span class="field-label">Уточнение (необязательно)</span>
      <div class="comment-grid" id="commentGrid"></div>
    </div>

    <button class="submit-btn" id="btnSubmit" type="button">Сохранить</button>
  </div>

  <div class="sub-page" id="settingsView" hidden>
    <header class="add-header">
      <button class="icon-btn" id="btnCloseSettings" type="button" aria-label="Назад">←</button>
      <h2 class="add-title">Категории</h2>
      <span class="add-header-spacer"></span>
    </header>

    <div class="settings-tabs">
      <button type="button" class="settings-tab settings-tab--active" id="tabExpense" data-tab="expense">Расходы</button>
      <button type="button" class="settings-tab" id="tabIncome" data-tab="income">Доходы</button>
    </div>

    <ul class="settings-list" id="settingsCatList"></ul>

    <button class="submit-btn submit-btn--outline" id="btnAddCategory" type="button">+ Добавить категорию</button>
  </div>

  <div class="sub-page" id="newCatView" hidden>
    <header class="add-header">
      <button class="icon-btn" id="btnCloseNewCat" type="button" aria-label="Назад">←</button>
      <h2 class="add-title" id="newCatTitle">Новая категория</h2>
      <span class="add-header-spacer"></span>
    </header>

    <div class="field">
      <span class="field-label">Иконка</span>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>

    <div class="field">
      <span class="field-label">Название</span>
      <div class="name-preview" id="namePreview">Название</div>
      <div class="case-toggle" id="caseToggle">
        <button type="button" class="case-btn case-btn--active" data-case="upper">Большие АБВ</button>
        <button type="button" class="case-btn" data-case="lower">Маленькие абв</button>
      </div>
      <div class="letter-pad" id="letterPad"></div>
    </div>

    <button class="submit-btn" id="btnSaveCategory" type="button">Сохранить категорию</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
